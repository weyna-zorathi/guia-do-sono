<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ritual de Som · Guia do Sono</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;600;700&family=Lora:ital,wght@1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#fdfbf7; --bg:#fdfbf7; --bg-card:#ffffff;
  --sage:#8a9e7f; --sage-d:#5a7050; --sage-l:#b5c9a8; --sage-p:#eef4eb;
  --tc:#c47a52; --tc-l:#e8b898;
  --lav:#9b8ec4; --lav-p:#f0edf8;
  --night:#2c3e2d; --gold:#c9a84c; --gold-l:#f0d98c; --gold-p:#faf3df;
  --text:#2d3a2d; --text-sub:#8a9070;
  --border:#e8e0d5; --border-d:#d0c8bc;
  --shadow:rgba(45,58,45,.06); --shadow-md:rgba(45,58,45,.13);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
body{padding-bottom:200px;}

/* ── HERO ── */
.rsh-hero{
  position:relative;overflow:hidden;
  background:linear-gradient(160deg,#1a2e1a 0%,#2d4a2d 55%,#3d5a3a 100%);
  min-height:220px;display:flex;flex-direction:column;justify-content:flex-end;
}
.rsh-hero-sky{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.rsh-star{position:absolute;background:#fff;border-radius:50%;
  animation:rsh-twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);opacity:0;}
@keyframes rsh-twinkle{0%,100%{opacity:0;}50%{opacity:var(--op,.7);}}
.rsh-hero-trees{position:absolute;bottom:0;left:0;right:0;height:72px;pointer-events:none;}
.rsh-hero-hdr{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(14px + env(safe-area-inset-top,0px)) 16px 14px;
}
.rsh-back{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);
  color:#fdfbf7;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;
  flex-shrink:0;
}
.rsh-back:active{background:rgba(255,255,255,.26);transform:scale(.92);}
.rsh-hdr-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#fdfbf7;}
.rsh-hdr-title em{color:var(--gold);font-style:italic;}
.rsh-hero-body{position:relative;z-index:2;padding:72px 20px 76px;}
.rsh-hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(253,251,247,.45);margin-bottom:6px;}
.rsh-hero-h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;
  color:#fdfbf7;line-height:1.2;margin-bottom:6px;}
.rsh-hero-h1 em{color:var(--gold);font-style:italic;}
.rsh-hero-sub{font-family:'Lora',serif;font-style:italic;font-size:13px;color:rgba(253,251,247,.52);}

/* ── TABS ── */
.rsh-tabs-outer{
  background:var(--bg);border-radius:24px 24px 0 0;
  margin-top:-22px;position:sticky;top:0;z-index:50;
  padding:16px 16px 0;
  box-shadow:0 -6px 20px rgba(0,0,0,.06);
}
.rsh-tabs{
  display:flex;gap:5px;background:#f0ece3;border-radius:15px;padding:5px;
  box-shadow:0 2px 8px var(--shadow);
}
.rsh-tab{
  flex:1;padding:10px 4px;border:none;border-radius:11px;
  background:transparent;color:var(--text-sub);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;
}
.rsh-tab.active{background:var(--night);color:#fdfbf7;box-shadow:0 3px 10px rgba(26,46,26,.28);}
.rsh-tab:active{transform:scale(.95);}

/* ── PANELS ── */
.rsh-panel{display:none;padding:16px 16px 8px;}
.rsh-panel.active{display:block;}
.rsh-sec-lbl{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--sage-d);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.rsh-sec-lbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--sage-l),transparent);}

/* ── CARDS GRID (2 col) ── */
.rsh-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rsh-card{
  position:relative;display:flex;flex-direction:column;align-items:center;
  gap:9px;padding:20px 10px 15px;
  background:var(--bg-card);border-radius:22px;border:1.5px solid var(--border);
  cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 2px 8px var(--shadow);overflow:hidden;text-align:center;
}
.rsh-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--cc,var(--sage));opacity:0;transition:opacity .2s;}
.rsh-card.active{border-color:var(--cc,var(--sage));background:var(--cb,var(--sage-p));
  box-shadow:0 6px 20px var(--shadow-md);transform:translateY(-2px);}
.rsh-card.active::before{opacity:1;}
.rsh-card:active{transform:scale(.96);}
.rsh-card-art{
  width:68px;height:68px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:32px;
  background:var(--cb,var(--sage-p));box-shadow:0 4px 14px rgba(0,0,0,.1);transition:transform .2s;
}
.rsh-card.active .rsh-card-art{transform:scale(1.08);}
.rsh-card-title{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:var(--text);line-height:1.3;}
.rsh-card.active .rsh-card-title{color:var(--cc,var(--sage-d));}
.rsh-card-desc{font-family:'Lora',serif;font-style:italic;font-size:11px;color:var(--text-sub);line-height:1.3;}

/* ── STORY LIST ── */
.rsh-story-list{display:flex;flex-direction:column;gap:10px;}
.rsh-story-item{
  display:flex;align-items:center;gap:14px;
  background:var(--bg-card);border-radius:22px;border:1.5px solid var(--border);
  padding:14px 16px;cursor:pointer;transition:all .2s;
  box-shadow:0 2px 8px var(--shadow);position:relative;overflow:hidden;
}
.rsh-story-item.active{border-color:var(--sage);background:var(--sage-p);box-shadow:0 6px 20px var(--shadow-md);}
.rsh-story-item.locked{opacity:.6;cursor:default;}
.rsh-story-item:not(.locked):active{transform:scale(.98);}
.rsh-story-art{
  width:60px;height:60px;border-radius:16px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 3px 10px rgba(0,0,0,.1);
}
.rsh-story-body{flex:1;min-width:0;}
.rsh-story-name{
  font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--text);
  line-height:1.3;margin-bottom:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.rsh-story-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.rsh-story-dur{font-size:11px;color:var(--text-sub);font-style:italic;font-family:'Lora',serif;}
.rsh-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;font-family:'DM Sans',sans-serif;letter-spacing:.04em;}
.rsh-badge-free{background:var(--sage-p);color:var(--sage-d);}
.rsh-badge-plus{background:var(--gold-p);color:#7a6010;}
.rsh-badge-premium{background:var(--lav-p);color:var(--lav);}
.rsh-story-play-btn{
  flex-shrink:0;padding:9px 15px;border-radius:100px;border:none;
  background:var(--sage-d);color:#fff;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(90,112,80,.3);white-space:nowrap;
}
.rsh-story-play-btn:active{transform:scale(.94);}
.rsh-story-play-btn.pausing{background:var(--tc);}
.rsh-story-locked-btn{
  flex-shrink:0;padding:9px 15px;border-radius:100px;border:none;
  background:#c0bab3;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:default;
}

/* ── TIMER SECTION ── */
.rsh-timer-sec{margin-top:20px;padding-top:18px;border-top:1px solid var(--border);}
.rsh-timer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.rsh-timer-opt{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:13px 8px;border-radius:16px;border:1.5px solid var(--border);
  background:var(--bg-card);cursor:pointer;transition:all .2s;
  box-shadow:0 2px 6px var(--shadow);font-family:'DM Sans',sans-serif;
}
.rsh-timer-opt:active{transform:scale(.95);}
.rsh-timer-opt.active{border-color:var(--sage-d);background:var(--sage-p);box-shadow:0 0 0 4px rgba(90,112,80,.12);}
.rsh-timer-opt .lbl{font-size:13px;font-weight:700;color:var(--text);}
.rsh-timer-opt.active .lbl{color:var(--sage-d);}
.rsh-timer-opt .sub{font-size:9px;font-weight:700;font-family:'DM Sans',sans-serif;}
.rsh-timer-opt.locked-opt{opacity:.55;cursor:default;}

/* ── FIXED PLAYER ── */
.rsh-player{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:linear-gradient(160deg,#0e1c0f 0%,#1a3020 100%);
  border-radius:24px 24px 0 0;
  padding:10px 16px calc(14px + env(safe-area-inset-bottom,0px));
  box-shadow:0 -8px 40px rgba(0,0,0,.32),0 0 0 1px rgba(138,158,127,.14);
  transform:translateY(110%);
  transition:transform .38s cubic-bezier(.2,.8,.4,1);
  max-height:72vh;overflow:hidden;display:flex;flex-direction:column;
}
.rsh-player.visible{transform:translateY(0);}
.rsh-player-handle{
  width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.18);
  margin:0 auto 10px;flex-shrink:0;cursor:pointer;
}
.rsh-player-main{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.rsh-player-art{
  width:52px;height:52px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  background:linear-gradient(135deg,rgba(138,158,127,.28),rgba(201,168,76,.18));
  border:1.5px solid rgba(255,255,255,.1);box-shadow:0 4px 14px rgba(0,0,0,.3);
  transition:all .3s;
}
.rsh-player-info{flex:1;min-width:0;}
.rsh-player-title{
  font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#fdfbf7;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;
}
.rsh-player-sub{font-family:'Lora',serif;font-style:italic;font-size:11px;color:rgba(255,255,255,.42);}
.rsh-player-btns{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.rsh-play-btn{
  width:48px;height:48px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#6aaa60,var(--sage-d));
  color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(90,112,80,.5);
  transition:transform .18s,box-shadow .18s;
}
.rsh-play-btn:active{transform:scale(.9);}
.rsh-play-btn.playing{background:linear-gradient(135deg,var(--tc),#a05038);box-shadow:0 4px 18px rgba(196,122,82,.45);}
.rsh-stop-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.65);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .18s;
}
.rsh-stop-btn:active{background:rgba(255,255,255,.2);transform:scale(.92);}
.rsh-progress-row{display:flex;align-items:center;gap:8px;margin-top:11px;flex-shrink:0;}
.rsh-prog-track{
  flex:1;height:3px;background:rgba(255,255,255,.12);border-radius:3px;
  cursor:pointer;position:relative;
}
.rsh-prog-fill{
  height:100%;width:0%;border-radius:3px;pointer-events:none;
  background:linear-gradient(90deg,var(--sage-l),var(--gold-l));
  transition:width .5s linear;
}
.rsh-prog-time{font-size:10px;color:rgba(255,255,255,.32);font-family:'DM Sans',sans-serif;flex-shrink:0;min-width:28px;text-align:right;}
.rsh-player-extra{display:flex;align-items:center;gap:8px;margin-top:10px;flex-shrink:0;}
.rsh-vol-icon{font-size:13px;flex-shrink:0;}
.rsh-vol-slider{
  flex:1;-webkit-appearance:none;appearance:none;height:3px;
  background:rgba(255,255,255,.15);border-radius:3px;cursor:pointer;outline:none;
}
.rsh-vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--sage-l);box-shadow:0 0 6px rgba(181,201,168,.5);cursor:pointer;
}
.rsh-timer-pills{display:flex;gap:4px;flex-shrink:0;}
.rsh-tpill{
  padding:5px 9px;border-radius:20px;border:1.5px solid rgba(255,255,255,.16);
  background:transparent;color:rgba(255,255,255,.45);
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;cursor:pointer;
  transition:all .18s;line-height:1;
}
.rsh-tpill.active{border-color:var(--sage-l);background:rgba(138,158,127,.2);color:var(--sage-l);}
.rsh-tpill:active{transform:scale(.9);}
/* Story text */
.rsh-story-text-panel{display:none;flex-direction:column;overflow:hidden;flex:1;min-height:0;margin-top:10px;}
.rsh-story-text-panel.visible{display:flex;}
.rsh-story-text-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border:none;background:transparent;
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.4);cursor:pointer;
  border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;width:100%;
}
.rsh-story-text-scroll{
  overflow-y:auto;flex:1;padding:8px 2px 4px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.rsh-story-text-scroll::-webkit-scrollbar{display:none;}
.rsh-story-text-content{
  font-family:'Lora',serif;font-style:italic;
  font-size:13px;line-height:1.85;color:rgba(255,255,255,.55);white-space:pre-wrap;
}
.rsh-countdown{
  text-align:center;margin-top:8px;font-family:'Lora',serif;font-style:italic;
  font-size:12px;color:rgba(255,255,255,.38);min-height:14px;flex-shrink:0;
}
</style>
</head>
<body>

<!-- HERO + HEADER -->
<div class="rsh-hero">
  <div class="rsh-hero-sky" id="rsh-stars"></div>
  <div class="rsh-hero-trees" id="rsh-trees"></div>
  <div class="rsh-hero-hdr">
    <button class="rsh-back" onclick="history.back()" aria-label="Voltar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div class="rsh-hdr-title">Ritual de <em>Som</em></div>
    <div style="width:40px"></div>
  </div>
  <div class="rsh-hero-body">
    <div class="rsh-hero-eyebrow">✦ Guia do Sono</div>
    <h1 class="rsh-hero-h1">Nosso Ritual de <em>Som</em></h1>
    <p class="rsh-hero-sub">Sons, músicas e histórias para adormecer com calma 🌙</p>
  </div>
</div>

<!-- MAIN -->
<div class="rsh-tabs-outer">
  <div class="rsh-tabs" role="tablist">
    <button class="rsh-tab active" onclick="switchTab(this,'noise')" role="tab">🌿 Ruído</button>
    <button class="rsh-tab" onclick="switchTab(this,'music')" role="tab">🎵 Músicas</button>
    <button class="rsh-tab" onclick="switchTab(this,'stories')" role="tab">📖 Histórias</button>
  </div>
</div>

<!-- Panel Ruído Branco -->
<div class="rsh-panel active" id="panel-noise">
  <div class="rsh-sec-lbl">Ambiente sonoro</div>
  <div class="rsh-grid" id="grid-noise"></div>
  <div class="rsh-timer-sec">
    <div class="rsh-sec-lbl" style="margin-bottom:0">⏱ Timer de sono</div>
    <div class="rsh-timer-grid" id="timers-noise"></div>
  </div>
</div>

<!-- Panel Músicas -->
<div class="rsh-panel" id="panel-music">
  <div class="rsh-sec-lbl">Músicas para acalmar</div>
  <div class="rsh-grid" id="grid-music"></div>
  <div class="rsh-timer-sec">
    <div class="rsh-sec-lbl" style="margin-bottom:0">⏱ Timer de sono</div>
    <div class="rsh-timer-grid" id="timers-music"></div>
  </div>
</div>

<!-- Panel Histórias -->
<div class="rsh-panel" id="panel-stories">
  <div class="rsh-sec-lbl">Histórias para dormir</div>
  <div class="rsh-story-list" id="grid-stories"></div>
</div>

<!-- FIXED PLAYER -->
<div class="rsh-player" id="rsh-player">
  <div class="rsh-player-handle" onclick="toggleExpand()"></div>
  <div class="rsh-player-main">
    <div class="rsh-player-art" id="pl-art">🌙</div>
    <div class="rsh-player-info">
      <div class="rsh-player-title" id="pl-title">Selecione um item</div>
      <div class="rsh-player-sub" id="pl-sub">Pronto para começar</div>
    </div>
    <div class="rsh-player-btns">
      <button class="rsh-stop-btn" onclick="playerStop()" title="Parar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      </button>
      <button class="rsh-play-btn" id="pl-play-btn" onclick="playerToggle()">
        <svg id="pl-play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
  </div>
  <div class="rsh-progress-row">
    <div class="rsh-prog-track" id="pl-prog-track" onclick="playerSeek(event)">
      <div class="rsh-prog-fill" id="pl-prog-fill"></div>
    </div>
    <div class="rsh-prog-time" id="pl-time">–:––</div>
  </div>
  <div class="rsh-player-extra">
    <span class="rsh-vol-icon">🔈</span>
    <input type="range" class="rsh-vol-slider" id="pl-vol" min="0" max="1" step="0.05" value="0.75" oninput="setVolume(this.value)">
    <div class="rsh-timer-pills">
      <button class="rsh-tpill active" onclick="selectTimer(this,30)" data-mins="30">30'</button>
      <button class="rsh-tpill" onclick="selectTimer(this,120)" data-mins="120">2h</button>
      <button class="rsh-tpill" onclick="selectTimer(this,0)" data-mins="0">∞</button>
    </div>
  </div>
  <div class="rsh-countdown" id="pl-countdown"></div>
  <div class="rsh-story-text-panel" id="pl-story-panel">
    <button class="rsh-story-text-toggle" id="pl-story-toggle" onclick="toggleStoryText()">
      <span>📜 Ver a história</span><span id="pl-story-arrow">▾</span>
    </button>
    <div class="rsh-story-text-scroll" id="pl-story-scroll" style="display:none">
      <div class="rsh-story-text-content" id="pl-story-text"></div>
    </div>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════
   DATA
═══════════════════════════════════ */
const SOUNDS = [
  { id:'chuva',   label:'Chuva Suave',       emoji:'🌧️', desc:'Gotas que acalmam',     cc:'#5a8fa3', cb:'#daeaf2', type:'file', src:'boons_freak-rain-sound-188158 (1).mp3' },
  { id:'branco',  label:'Ruído Branco',       emoji:'☁️',  desc:'Véu de silêncio',       cc:'#8a9e7f', cb:'#e3ede0', type:'noise', freq:'white' },
  { id:'mar',     label:'Ondas do Mar',       emoji:'🌊', desc:'Ritmo das marés',        cc:'#4a7fa3', cb:'#d5e8f5', type:'noise', freq:'ocean' },
  { id:'folhas',  label:'Vento nas Folhas',   emoji:'🍃', desc:'Brisa do campo',         cc:'#6b8f5a', cb:'#ddecd6', type:'file', src:'freesound_community-wind-in-trees-autumn-leaves-rustle-weird-howls-med-77mel-191122-17549.mp3' },
  { id:'rosa',    label:'Ruído Rosa',         emoji:'🌸', desc:'Graves acolhedores',     cc:'#c47a8a', cb:'#f5dde5', type:'noise', freq:'pink' },
  { id:'coracao', label:'Batimentos',         emoji:'❤️', desc:'Pulso do útero',         cc:'#c47a52', cb:'#f5e3d8', type:'noise', freq:'heartbeat' }

function getUserPlan() {
  try {
    const p = JSON.parse(localStorage.getItem('gds_persist')||'{}');
    if (p.modoTeste && Date.now() < p.expiry) return 'premium';
    const s = JSON.parse(localStorage.getItem('gds_session_v2')||'{}');

  } catch(e) {}
  return 'free';
}
function canAccess(plan) {

  return plan === 'free';
}

/* ═══════════════════════════════════
   WEB AUDIO ENGINE
═══════════════════════════════════ */
let audioCtx = null;
let noiseNode = null, gainNode = null;
let oscNodes = [];
let fileAudio = null;
let synthUtter = null;
let storyProgHandle = null;
let storyLen = 0, storyStart = 0;

function getCtx() {
  if (!audioCtx || audioCtx.state === 'closed')
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function stopAll() {
  if (fileAudio) { try { fileAudio.pause(); fileAudio.currentTime = 0; } catch(e){} fileAudio = null; }
  if (noiseNode) { try { noiseNode.disconnect(); } catch(e){} noiseNode = null; }
  if (gainNode)  { try { gainNode.disconnect();  } catch(e){} gainNode = null; }
  oscNodes.forEach(function(n){ try { n.stop(); n.disconnect(); } catch(e){} });
  oscNodes = [];
  if (synthUtter || (window.speechSynthesis && window.speechSynthesis.speaking)) {
    window.speechSynthesis.cancel(); synthUtter = null;
  }
  if (storyProgHandle) { clearInterval(storyProgHandle); storyProgHandle = null; }
  clearTimer();
  isPlaying = false;
}

/* noise generators */
function mkWhite(ctx, g) {
  const buf = 4096;
  const n = ctx.createScriptProcessor(buf,1,1);
  n.onaudioprocess = function(e){ const o=e.outputBuffer.getChannelData(0); for(let i=0;i<buf;i++) o[i]=Math.random()*2-1; };
  n.connect(g);
  return n;
}
function mkOcean(ctx, g) {
  const buf = 4096; let last=0;
  const n = ctx.createScriptProcessor(buf,1,1);
  n.onaudioprocess = function(e){ const o=e.outputBuffer.getChannelData(0); for(let i=0;i<buf;i++){ const w=Math.random()*2-1; o[i]=(last+(0.02*w))/1.02; last=o[i]; o[i]*=3.5; } };
  n.connect(g); return n;
}
function mkWind(ctx, g) {
  const buf = 4096; let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  const n = ctx.createScriptProcessor(buf,1,1);
  n.onaudioprocess = function(e){ const o=e.outputBuffer.getChannelData(0); for(let i=0;i<buf;i++){ const w=Math.random()*2-1; b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759; b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856; b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980; o[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926; } };
  n.connect(g); return n;
}
function mkPink(ctx, g) {
  const buf = 4096; let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  const n = ctx.createScriptProcessor(buf,1,1);
  n.onaudioprocess = function(e){ const o=e.outputBuffer.getChannelData(0); for(let i=0;i<buf;i++){ const w=Math.random()*2-1; b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759; b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856; b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980; o[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.13; b6=w*0.115926; } };
  n.connect(g); return n;
}
function mkHeartbeat(ctx, g) {
  function beat() {
    if (!isPlaying) return;
    try {
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(60, now);
      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime(0.6, now + 0.05);
      env.gain.linearRampToValueAtTime(0, now + 0.18);
      osc.connect(env); env.connect(g);
      osc.start(now); osc.stop(now + 0.2);
      osc.onended = function(){ try{osc.disconnect();env.disconnect();}catch(e){} };
      const osc2 = ctx.createOscillator();
      const env2 = ctx.createGain();
      osc2.type = 'sine'; osc2.frequency.setValueAtTime(55, now + 0.22);
      env2.gain.setValueAtTime(0, now + 0.22);
      env2.gain.linearRampToValueAtTime(0.4, now + 0.27);
      env2.gain.linearRampToValueAtTime(0, now + 0.38);
      osc2.connect(env2); env2.connect(g);
      osc2.start(now + 0.22); osc2.stop(now + 0.4);
      osc2.onended = function(){ try{osc2.disconnect();env2.disconnect();}catch(e){} };
      setTimeout(beat, 900);
    } catch(e) {}
  }
  beat();
  return null; // no persistent node
}

/* music generators */
function mkSine(ctx, g, freq) {
  const osc = ctx.createOscillator();
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  osc.type = 'sine'; osc.frequency.value = freq;
  lfo.type = 'sine'; lfo.frequency.value = 0.12;
  lfoGain.gain.value = 0.08;
  lfo.connect(lfoGain); lfoGain.connect(g.gain||g);
  osc.connect(g); lfo.start(); osc.start();
  oscNodes.push(osc, lfo);
}
function mkCrystal(ctx, g, freq) {
  [freq, freq*2, freq*3, freq*4].forEach(function(f, i) {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = f;
    env.gain.value = 0.25 / (i+1);
    osc.connect(env); env.connect(g); osc.start();
    oscNodes.push(osc);
  });
}
function mkPentatonic(ctx, g) {
  const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
  let idx = 0;
  function playNote() {
    if (!isPlaying) return;
    try {
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.type = 'triangle'; osc.frequency.value = notes[idx % notes.length];
      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime(0.18, now + 0.12);
      env.gain.linearRampToValueAtTime(0, now + 0.9);
      osc.connect(env); env.connect(g); osc.start(now); osc.stop(now + 1);
      osc.onended = function(){ try{osc.disconnect();env.disconnect();}catch(e){} };
      idx++;
      setTimeout(playNote, 1400);
    } catch(e) {}
  }
  playNote();
}
function mkBinaural(ctx, g, freq) {
  const beat = 4; // 4 Hz delta wave
  const chL = ctx.createStereoPanner ? ctx.createStereoPanner() : ctx.createChannelMerger(2);
  const chR = ctx.createStereoPanner ? ctx.createStereoPanner() : ctx.createChannelMerger(2);
  const oscL = ctx.createOscillator();
  const oscR = ctx.createOscillator();
  oscL.type = 'sine'; oscL.frequency.value = freq;
  oscR.type = 'sine'; oscR.frequency.value = freq + beat;
  if (ctx.createStereoPanner) {
    chL.pan.value = -1; chR.pan.value = 1;
    oscL.connect(chL); chL.connect(g);
    oscR.connect(chR); chR.connect(g);
  } else {
    oscL.connect(g); oscR.connect(g);
  }
  oscL.start(); oscR.start();
  oscNodes.push(oscL, oscR);
}

function playNoise(sound, vol) {
  const ctx = getCtx();
  gainNode = ctx.createGain();
  gainNode.gain.value = vol;
  gainNode.connect(ctx.destination);
  if (sound.freq === 'white')     { noiseNode = mkWhite(ctx, gainNode); }
  else if (sound.freq === 'ocean'){ noiseNode = mkOcean(ctx, gainNode); }
  else if (sound.freq === 'wind') { noiseNode = mkWind(ctx, gainNode); }
  else if (sound.freq === 'pink') { noiseNode = mkPink(ctx, gainNode); }
  else if (sound.freq === 'heartbeat') { mkHeartbeat(ctx, gainNode); }
}

function playMusic(music, vol) {
  const ctx = getCtx();
  gainNode = ctx.createGain();
  gainNode.gain.value = vol;
  gainNode.connect(ctx.destination);
  if (music.wave === 'sine')        mkSine(ctx, gainNode, music.freq);
  else if (music.wave === 'crystal')mkCrystal(ctx, gainNode, music.freq);
  else if (music.wave === 'pentatonic') mkPentatonic(ctx, gainNode);
  else if (music.wave === 'binaural')   mkBinaural(ctx, gainNode, music.freq);
}

let currentItem = null;
let isPlaying = false;
let timerMins = 30;
let timerHandle = null;
let timerEndHandle = null;
let expanded = false;
let storyTextOpen = false;

/* ═══════════════════════════════════
   PLAYER CORE
═══════════════════════════════════ */
function getVol() { return parseFloat(document.getElementById('pl-vol').value); }

function setVolume(v) {
  v = parseFloat(v);
  if (gainNode) gainNode.gain.setValueAtTime(v, (audioCtx||{}).currentTime||0);
  if (fileAudio) fileAudio.volume = v;
}

function showPlayer() {
  document.getElementById('rsh-player').classList.add('visible');
}
function hidePlayer() {
  document.getElementById('rsh-player').classList.remove('visible');
}
function toggleExpand() {
  expanded = !expanded;
  const p = document.getElementById('rsh-player');
  p.style.maxHeight = expanded ? '72vh' : '';
}

function setPlayBtnState(playing) {
  const btn = document.getElementById('pl-play-btn');
  const icon = document.getElementById('pl-play-icon');
  if (!btn || !icon) return;
  if (playing) {
    btn.classList.add('playing');
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16" rx="2"/><rect x="14" y="4" width="4" height="16" rx="2"/>';
  } else {
    btn.classList.remove('playing');
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  }
}

function updatePlayerInfo(item) {
  document.getElementById('pl-art').textContent = item.emoji;
  document.getElementById('pl-art').style.background =
    item.artBg || ('linear-gradient(135deg,'+item.cc+'44,'+item.cb+')');
  document.getElementById('pl-title').textContent = item.label;
  document.getElementById('pl-sub').textContent = item.desc || item.duration || '';
  const storyPanel = document.getElementById('pl-story-panel');
  if (item.text) {
    storyPanel.classList.add('visible');
    document.getElementById('pl-story-text').textContent = item.text;
  } else {
    storyPanel.classList.remove('visible');
  }
}

function playerStop() {
  stopAll();
  isPlaying = false;
  setPlayBtnState(false);
  setProg(0);
  document.getElementById('pl-time').textContent = '–:––';
  document.getElementById('pl-countdown').textContent = '';
  currentItem = null;
  document.querySelectorAll('.rsh-card.active').forEach(function(c){ c.classList.remove('active'); });
  document.querySelectorAll('.rsh-story-item.active').forEach(function(c){ c.classList.remove('active'); });
  document.querySelectorAll('.rsh-story-play-btn.pausing').forEach(function(b){ b.classList.remove('pausing'); b.textContent='▶ Ouvir'; });
  hidePlayer();
}

function playerToggle() {
  if (!currentItem) return;
  if (isPlaying) {
    if (fileAudio) fileAudio.pause();
    if (gainNode) gainNode.gain.setValueAtTime(0, (audioCtx||{}).currentTime||0);
    if (window.speechSynthesis) window.speechSynthesis.pause();
    isPlaying = false; setPlayBtnState(false);
  } else {
    if (fileAudio) fileAudio.play().catch(function(){});
    if (gainNode) gainNode.gain.setValueAtTime(getVol(), (audioCtx||{}).currentTime||0);
    if (synthUtter && window.speechSynthesis) window.speechSynthesis.resume();
    isPlaying = true; setPlayBtnState(true);
    applyTimer();
  }
}

function playerSeek(e) {
  if (!storyLen) return;
  const track = document.getElementById('pl-prog-track');
  const pct = e.offsetX / track.offsetWidth;
  const t = pct * storyLen;
  storyStart = Date.now() - t * 1000;
  setProg(pct * 100);
}

function setProg(pct) {
  document.getElementById('pl-prog-fill').style.width = pct + '%';
}

/* ═══════════════════════════════════
   TIMER
═══════════════════════════════════ */
function clearTimer() {
  if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
  if (timerEndHandle) { clearTimeout(timerEndHandle); timerEndHandle = null; }
}

function applyTimer() {
  clearTimer();
  const cd = document.getElementById('pl-countdown');
  if (timerMins === 0) { if (cd) cd.textContent = '∞ Tocando sem parar'; return; }
  const ms = timerMins * 60 * 1000;
  const end = Date.now() + ms;
  timerEndHandle = setTimeout(function(){
    stopAll(); setPlayBtnState(false); hidePlayer(); currentItem = null;
  }, ms);
  timerHandle = setInterval(function(){
    const rem = end - Date.now();
    if (rem <= 0) { clearTimer(); return; }
    const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
    if (cd) cd.textContent = '⏱ ' + m + ':' + (s<10?'0':'') + s;
  }, 1000);
}

function selectTimer(btn, mins) {
  timerMins = mins;
  document.querySelectorAll('.rsh-tpill').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  if (isPlaying) applyTimer();
}

/* ═══════════════════════════════════
   SELECT SOUND
═══════════════════════════════════ */
function selectSound(sound) {
  stopAll();
  currentItem = sound;
  const vol = getVol();
  if (sound.type === 'file') {
    fileAudio = new Audio(sound.src); fileAudio.loop = true; fileAudio.volume = vol;
    fileAudio.play().catch(function(){});
  } else {
    playNoise(sound, vol);
  }
  isPlaying = true;
  setPlayBtnState(true);
  updatePlayerInfo(sound);
  showPlayer();
  applyTimer();
  document.querySelectorAll('#grid-noise .rsh-card, #grid-music .rsh-card').forEach(function(c){ c.classList.remove('active'); });
  const card = document.getElementById('card-'+sound.id);
  if (card) card.classList.add('active');
}

   SELECT MUSIC

function selectMusicItem(music) {
  stopAll();
  currentItem = music;
  playMusic(music, getVol());
  isPlaying = true;
  setPlayBtnState(true);
  updatePlayerInfo(music);
  showPlayer();
  applyTimer();
  document.querySelectorAll('#grid-music .rsh-card').forEach(function(c){ c.classList.remove('active'); });
  const card = document.getElementById('card-'+music.id);
  if (card) card.classList.add('active');
}

/* ═══════════════════════════════════
   SELECT STORY
═══════════════════════════════════ */
function selectStory(story) {
  if (!canAccess(story.plan)) return;
  stopAll();
  currentItem = story;
  const vol = getVol();
  isPlaying = true;
  setPlayBtnState(true);
  updatePlayerInfo(story);
  showPlayer();
  document.querySelectorAll('.rsh-story-item').forEach(function(el){ el.classList.remove('active'); });
  const item = document.getElementById('story-'+story.id);
  if (item) item.classList.add('active');
  const btn = document.getElementById('sbtn-'+story.id);
  if (btn) { btn.textContent = '⏸ Pausar'; btn.classList.add('pausing'); }
  // speech synthesis
  const utter = new SpeechSynthesisUtterance(story.text);
  utter.lang = 'pt-BR'; utter.rate = 0.82; utter.pitch = 0.95; utter.volume = vol;
  const voices = window.speechSynthesis.getVoices();
  const ptV = voices.find(function(v){ return v.lang.startsWith('pt') && /feminin|female|mulher/i.test(v.name); })
           || voices.find(function(v){ return v.lang.startsWith('pt'); });
  if (ptV) utter.voice = ptV;
  synthUtter = utter;
  utter.onend = function() {
    isPlaying = false; setPlayBtnState(false); setProg(100);
    if (btn) { btn.textContent = '▶ Ouvir'; btn.classList.remove('pausing'); }
    clearInterval(storyProgHandle);
  };
  utter.onerror = function() { isPlaying = false; setPlayBtnState(false); };
  // estimate duration
  const words = story.text.split(/\s+/).length;
  storyLen = (words / 130) * 60; // seconds
  storyStart = Date.now();
  setProg(0);
  document.getElementById('pl-prog-fill').style.transition = 'none';
  storyProgHandle = setInterval(function() {
    if (!isPlaying) return;
    const elapsed = (Date.now() - storyStart) / 1000;
    const pct = Math.min((elapsed / storyLen) * 100, 100);
    setProg(pct);
    const rem = Math.max(0, Math.round(storyLen - elapsed));
    document.getElementById('pl-time').textContent =
      Math.floor(rem/60) + ':' + String(rem%60).padStart(2,'0');
  }, 500);
  window.speechSynthesis.speak(utter);
  applyTimer();
}

function toggleStoryText() {
  storyTextOpen = !storyTextOpen;
  const scroll = document.getElementById('pl-story-scroll');
  const arrow  = document.getElementById('pl-story-arrow');
  scroll.style.display = storyTextOpen ? 'block' : 'none';
  arrow.textContent    = storyTextOpen ? '▴' : '▾';
}

/* ═══════════════════════════════════
   TABS
═══════════════════════════════════ */
function switchTab(btn, panelId) {
  document.querySelectorAll('.rsh-tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.rsh-panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('panel-'+panelId).classList.add('active');
}

/* ═══════════════════════════════════
   RENDER
═══════════════════════════════════ */
function renderTimers(containerId) {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = '';
  TIMER_OPTS.forEach(function(opt) {
    const ok = canAccess(opt.plan);
    const el = document.createElement('div');
    el.className = 'rsh-timer-opt' + (opt.mins===30?' active':'') + (!ok?' locked-opt':'');
    el.innerHTML =
      '<span class="lbl">' + opt.label + '</span>' +
      '<span class="sub" style="color:' + opt.planColor + '">' + opt.planLabel + '</span>';
    if (ok) el.onclick = function() {
      document.querySelectorAll('.rsh-timer-opt').forEach(function(b){ b.classList.remove('active'); });
      el.classList.add('active');
      timerMins = opt.mins;
      if (isPlaying) applyTimer();
    };
    c.appendChild(el);
  });
}

function renderNoise() {
  const g = document.getElementById('grid-noise');
  SOUNDS.forEach(function(s) {
    const el = document.createElement('div');
    el.className = 'rsh-card'; el.id = 'card-'+s.id;
    el.style.cssText = '--cc:'+s.cc+';--cb:'+s.cb;
    el.innerHTML =
      '<div class="rsh-card-art">' + s.emoji + '</div>' +
      '<div class="rsh-card-title">' + s.label + '</div>' +
      '<div class="rsh-card-desc">' + s.desc + '</div>';
    el.onclick = function() { selectSound(s); };
    g.appendChild(el);
  });
  renderTimers('timers-noise');
}

function renderMusic() {
  const g = document.getElementById('grid-music');
  MUSIC.forEach(function(m) {
    const el = document.createElement('div');
    el.className = 'rsh-card'; el.id = 'card-'+m.id;
    el.style.cssText = '--cc:'+m.cc+';--cb:'+m.cb;
    el.innerHTML =
      '<div class="rsh-card-art">' + m.emoji + '</div>' +
      '<div class="rsh-card-title">' + m.label + '</div>' +
      '<div class="rsh-card-desc">' + m.desc + '</div>';
    el.onclick = function() { selectMusicItem(m); };
    g.appendChild(el);
  });
  renderTimers('timers-music');
}

function renderStories() {
  const g = document.getElementById('grid-stories');
  STORIES.forEach(function(story) {
    const ok = canAccess(story.plan);
    const el = document.createElement('div');
    el.className = 'rsh-story-item' + (!ok?' locked':''); el.id = 'story-'+story.id;
    el.innerHTML =
      '<div class="rsh-story-art" style="background:' + story.artBg + '">' + story.emoji + '</div>' +
      '<div class="rsh-story-body">' +
        '<div class="rsh-story-name">' + story.label + '</div>' +
        '<div class="rsh-story-meta">' +
          '<span class="rsh-story-dur">' + story.duration + '</span>' +
          '<span class="rsh-badge rsh-badge-' + story.plan + '">' + story.planLabel + '</span>' +
        '</div>' +
      '</div>' +
      (ok
        ? '<button class="rsh-story-play-btn" id="sbtn-'+story.id+'">▶ Ouvir</button>'
        : '<button class="rsh-story-locked-btn">🔒 Ouvir</button>');
    if (ok) {
      el.onclick = function() { selectStory(story); };
      const btn = el.querySelector('.rsh-story-play-btn');
      btn.onclick = function(e) { e.stopPropagation(); selectStory(story); };
    }
    g.appendChild(el);
  });
}

/* ═══════════════════════════════════
   HERO DECORATION
═══════════════════════════════════ */
function buildStars() {
  const c = document.getElementById('rsh-stars'); if (!c) return;
  const configs = [{n:18,sz:1.5,op:[.5,.9],d:[2,4]},{n:10,sz:2.5,op:[.6,1],d:[3,5]},{n:6,sz:1,op:[.3,.6],d:[1.5,3]}];
  let html = '';
  configs.forEach(function(cfg){
    for (let i=0;i<cfg.n;i++){
      const x=(Math.random()*100).toFixed(1), y=(Math.random()*75).toFixed(1);
      const op=(cfg.op[0]+Math.random()*(cfg.op[1]-cfg.op[0])).toFixed(2);
      const d=(cfg.d[0]+Math.random()*(cfg.d[1]-cfg.d[0])).toFixed(1);
      const dl=(Math.random()*-4).toFixed(1);
      html+='<div class="rsh-star" style="left:'+x+'%;top:'+y+'%;width:'+cfg.sz+'px;height:'+cfg.sz+'px;--op:'+op+';--d:'+d+'s;--delay:'+dl+'s"></div>';
    }
  });
  c.innerHTML = html;
}

function buildTrees() {
  const c = document.getElementById('rsh-trees'); if (!c) return;
  c.innerHTML = '<svg viewBox="0 0 375 72" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:72px;display:block">' +
    '<polygon points="0,72 18,30 36,72" fill="#0a1a0c"/><polygon points="4,72 18,42 32,72" fill="#0e2010"/><rect x="16" y="70" width="4" height="8" fill="#0a1a0c"/>' +
    '<polygon points="40,72 55,24 70,72" fill="#0a1a0c"/><polygon points="44,72 55,36 66,72" fill="#0e2010"/><rect x="53" y="70" width="4" height="8" fill="#0a1a0c"/>' +
    '<polygon points="280,72 295,26 310,72" fill="#0a1a0c"/><polygon points="284,72 295,38 306,72" fill="#0e2010"/><rect x="293" y="70" width="4" height="8" fill="#0a1a0c"/>' +
    '<polygon points="318,72 336,20 354,72" fill="#0a1a0c"/><polygon points="322,72 336,34 350,72" fill="#0e2010"/><rect x="334" y="70" width="4" height="8" fill="#0a1a0c"/>' +
    '<polygon points="355,72 368,30 375,50 375,72" fill="#0d1f0d"/>' +
    '<rect x="0" y="66" width="375" height="8" fill="#0a1a0a" opacity="0.6"/>' +
  '</svg>';
}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
buildStars();
buildTrees();
renderNoise();
renderMusic();
renderStories();

if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); };
}
</script>
