<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia do Sono — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream:   #faf6ef;
  --warm:    #fff9f2;
  --sage:    #8a9e7f;
  --sage-l:  #b5c9a8;
  --sage-d:  #5a7050;
  --sage-p:  #edf3e8;
  --tc:      #c47a52;
  --tc-l:    #e8a97e;
  --tc-p:    #f5e0d0;
  --brown:   #7a5c3e;
  --brown-l: #a07850;
  --linen:   #ede5d8;
  --linen-d: #d8ccb8;
  --night:   #2c3e2d;
  --gold:    #c9a84c;
  --gold-l:  #e8cc7e;
  --gold-p:  #faf3df;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #e8e0d5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  background-image:
    radial-gradient(ellipse at 15% 15%, rgba(196,122,82,0.13) 0%, transparent 48%),
    radial-gradient(ellipse at 85% 85%, rgba(138,158,127,0.13) 0%, transparent 48%),
    radial-gradient(ellipse at 50% 50%, rgba(201,168,76,0.05) 0%, transparent 65%);
}

/* ── PHONE FRAME ── */
.phone {
  width: 390px;
  min-height: 750px;
  background: var(--cream);
  border-radius: 48px;
  box-shadow:
    0 0 0 10px #1a1a1a,
    0 0 0 12px #2a2a2a,
    0 40px 100px rgba(0,0,0,0.35),
    0 8px 24px rgba(0,0,0,0.2);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}
.phone::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 34px;
  background: #1a1a1a;
  border-radius: 0 0 22px 22px;
  z-index: 100;
}

/* ── STATUS BAR ── */
.status-bar {
  padding: 14px 28px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  margin-top: 6px;
}
.status-time { font-size: 15px; font-weight: 600; color: var(--night); }
.status-icons { font-size: 12px; color: var(--night); display:flex; gap:5px; align-items:center; }

/* ── HERO TOP (dark) ── */
.login-hero {
  background: var(--night);
  padding: 28px 28px 44px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.login-hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 80% at 10% 80%, rgba(138,158,127,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 90% 10%, rgba(201,168,76,0.14) 0%, transparent 55%);
  pointer-events: none;
}

/* folhinhas decorativas SVG */
.hero-leaves {
  position: absolute;
  right: -10px; top: -10px;
  width: 130px;
  opacity: 0.10;
  pointer-events: none;
}

.login-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(201,168,76,0.18);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold-l);
  margin-bottom: 16px;
  position: relative;
  z-index: 1;
}
.badge-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold-l);
  animation: blink 2.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

.login-logo {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 6px;
  position: relative;
  z-index: 1;
}
.login-logo em { color: var(--tc-l); font-style: italic; }

.login-tagline {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  position: relative;
  z-index: 1;
}

/* moon ornament */
.moon-svg {
  position: absolute;
  bottom: -18px; right: 24px;
  width: 56px;
  opacity: 0.18;
  z-index: 1;
}

/* ── FORM AREA ── */
.login-form-wrap {
  flex: 1;
  padding: 36px 28px 32px;
  display: flex;
  flex-direction: column;
  background: var(--cream);
  background-image:
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c47a52' fill-opacity='0.018'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
}

.form-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--night);
  margin-bottom: 4px;
}
.form-title em { color: var(--tc); font-style: italic; }
.form-sub {
  font-size: 12px;
  color: var(--brown-l);
  margin-bottom: 28px;
  font-family: 'Lora', serif;
  font-style: italic;
}

/* inputs */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
}
.input-wrap {
  position: relative;
}
.input-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  pointer-events: none;
}
.form-input {
  width: 100%;
  padding: 14px 16px 14px 44px;
  border: 1.5px solid var(--linen-d);
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--night);
  background: var(--warm);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input::placeholder { color: var(--brown-l); opacity: 0.55; }
.form-input:focus {
  border-color: var(--sage);
  box-shadow: 0 0 0 3px rgba(138,158,127,0.12);
}

.forgot-link {
  font-size: 12px;
  color: var(--tc);
  text-align: right;
  margin-top: -4px;
  margin-bottom: 20px;
  cursor: pointer;
  font-weight: 500;
}

/* botão principal */
.btn-primary {
  width: 100%;
  padding: 15px;
  background: var(--night);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.btn-primary::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.06) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.5s;
}
.btn-primary:hover::after { transform: translateX(100%); }
.btn-primary:hover { background: var(--sage-d); transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.99); }

/* divider */
.divider-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.divider-row::before, .divider-row::after {
  content: ''; flex: 1; height: 1px;
  background: var(--linen-d);
}
.divider-text { font-size: 11px; color: var(--brown-l); white-space: nowrap; }

/* botão Google */
.btn-google {
  width: 100%;
  padding: 13px;
  background: var(--warm);
  color: var(--night);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  border: 1.5px solid var(--linen-d);
  border-radius: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 24px;
}
.btn-google:hover { border-color: var(--linen-d); background: var(--linen); }

/* cadastro link */
.signup-row {
  text-align: center;
  font-size: 12px;
  color: var(--brown-l);
  margin-top: auto;
}
.signup-link {
  color: var(--tc);
  font-weight: 600;
  cursor: pointer;
  margin-left: 4px;
}

/* ── ANIMAÇÕES ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
.login-hero    { animation: fadeUp 0.5s ease forwards; }
.login-form-wrap { animation: fadeUp 0.5s ease 0.1s forwards; opacity:0; }

/* ── ESTADO DE SUCESSO ── */
.success-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: var(--night);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  border-radius: 48px;
}
.success-overlay.show { display: flex; animation: fadeUp 0.4s ease; }
.success-icon { font-size: 48px; }
.success-msg-text {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  text-align: center;
}
.success-msg-text em { color: var(--tc-l); font-style: italic; }
.success-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  font-family: 'Lora', serif;
  font-style: italic;
}
</style>
</head>
<body>

<div class="phone">

  <!-- SUCCESS OVERLAY -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">🌿</div>
    <div class="success-msg-text">Bem-vinda de volta,<br><em>mamãe</em></div>
    <div class="success-sub">Carregando seu Guia do Sono…</div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <span>▲▲▲</span>
      <span>WiFi</span>
      <span>🔋</span>
    </div>
  </div>

  <!-- HERO -->
  <div class="login-hero">
    <!-- folhas -->
    <svg class="hero-leaves" viewBox="0 0 130 180" fill="none">
      <path d="M65 175C35 145 5 110 10 65C15 20 55 5 65 2C75 5 115 20 120 65C125 110 95 145 65 175Z" fill="#b5c9a8"/>
      <path d="M65 2 L65 175" stroke="#b5c9a8" stroke-width="1.5" opacity="0.5"/>
      <path d="M65 40 C48 52 32 65 26 90" stroke="#b5c9a8" stroke-width="1" opacity="0.4"/>
      <path d="M65 40 C82 52 98 65 104 90" stroke="#b5c9a8" stroke-width="1" opacity="0.4"/>
      <path d="M65 90 C48 105 34 118 30 135" stroke="#b5c9a8" stroke-width="1" opacity="0.4"/>
      <path d="M65 90 C82 105 96 118 100 135" stroke="#b5c9a8" stroke-width="1" opacity="0.4"/>
    </svg>

    <!-- lua -->
    <svg class="moon-svg" viewBox="0 0 56 56" fill="none">
      <path d="M46 28C46 37.94 37.94 46 28 46C18.06 46 10 37.94 10 28C10 18.06 18.06 10 28 10C18 14 13 21 13 28C13 35 18 42 28 46C36 42 41 35 41 28C41 21 36 14 28 10C38 10 46 18.06 46 28Z" fill="#c9a84c"/>
    </svg>

    <div class="login-badge">
      <span class="badge-dot"></span>
      Guia do Sono · App
    </div>

    <div class="login-logo">
      Sono gentil,<br>noites <em>mais leves</em>
    </div>
    <div class="login-tagline">Para a mãe que merece descansar também.</div>
  </div>

  <!-- FORM -->
  <div class="login-form-wrap">
    <div class="form-title">Entre na sua <em>conta</em></div>
    <div class="form-sub">Sua família te espera aqui dentro 🌿</div>

    <div class="input-group">
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input class="form-input" type="email" id="emailInput" placeholder="Seu e-mail" autocomplete="email">
      </div>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input class="form-input" type="password" id="passInput" placeholder="Senha" autocomplete="current-password">
      </div>
    </div>

    <div class="forgot-link">Esqueci minha senha</div>

    <button class="btn-primary" onclick="handleLogin()">Entrar no Guia do Sono</button>

    <div class="divider-row">
      <span class="divider-text">ou continue com</span>
    </div>

    <button class="btn-google" onclick="handleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.96L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Entrar com Google
    </button>

    <div class="signup-row">
      Ainda não tem conta?
      <span class="signup-link" onclick="handleLogin()">Criar conta grátis</span>
    </div>
  </div>

</div>

<script>
function handleLogin() {
  const overlay = document.getElementById('successOverlay');
  overlay.classList.add('show');
  setTimeout(() => {
    window.location.href = 'dashboard.html';
  }, 1800);
}

document.getElementById('passInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
</script>

</body>
</html>
