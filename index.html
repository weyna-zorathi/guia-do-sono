<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia do Sono • Casulo de Paz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #faf6ef;
  --sage: #8a9e7f;
  --terra: #c47a52;
  --night: #2c3e2d;
  --brown: #7a5c3e;
  --radius: 28px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--cream);
  color: var(--brown);
  min-height: 100vh;
  overflow-x: hidden;
}

.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* Navbar inferior */
.nav-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(250, 246, 239, 0.98);
  backdrop-filter: blur(20px);
  border-top: 1px solid #d8ccb8;
  display: flex;
  justify-content: space-around;
  padding: 12px 0 max(12px, env(safe-area-inset-bottom));
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: #a07850;
  font-size: 10px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 16px;
  transition: all 0.3s;
}
.nav-item.active {
  color: var(--terra);
  background: rgba(196,122,82,0.08);
}
.nav-item .nav-icon { font-size: 26px; }

/* Chat Screen */
#screen-chat {
  background: #f8f4eb;
  padding-bottom: 90px;
}
.chat-header {
  background: #1f2c21;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 20;
}
.chat-avatar {
  width: 52px; height: 52px;
  background: rgba(232,169,126,0.3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  border: 3px solid rgba(232,169,126,0.5);
}
.chat-messages {
  flex: 1;
  padding: 24px 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 18px;
  background: #f8f4eb;
}
.msg-row { display: flex; gap: 12px; align-items: flex-end; }
.msg-row.user { flex-direction: row-reverse; }
.msg-bubble {
  max-width: 82%;
  padding: 15px 20px;
  border-radius: 24px;
  font-size: 0.95rem;
  line-height: 1.65;
}
.msg-row:not(.user) .msg-bubble {
  background: white;
  border: 1px solid #e5d9c8;
  border-bottom-left-radius: 8px;
}
.msg-row.user .msg-bubble {
  background: var(--terra);
  color: white;
  border-bottom-right-radius: 8px;
}
.msg-bubble-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  background: rgba(196,122,82,0.15);
}

.chat-input-area {
  padding: 16px 20px;
  background: rgba(248,244,235,0.97);
  border-top: 1px solid #d8ccb8;
  position: sticky;
  bottom: 80px;
}
.chat-input-area .input-wrapper {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  max-width: 720px;
  margin: 0 auto;
}
.chat-textarea {
  flex: 1;
  background: white;
  border: 2px solid #d8ccb8;
  border-radius: 30px;
  padding: 16px 22px;
  font-size: 1.02rem;
  resize: none;
  min-height: 56px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}
.chat-send-btn {
  width: 56px; height: 56px;
  background: #c47a52;
  color: white;
  border: none;
  border-radius: 50%;
  font-size: 24px;
  box-shadow: 0 8px 25px rgba(196,122,82,0.45);
}
</style>
</head>
<body>

<!-- TELA DO CHAT -->
<div id="screen-chat" class="screen active">
  <div class="chat-header">
    <div class="chat-avatar">🌿</div>
    <div>
      <div style="color:white; font-weight:600; font-size:1.15rem;">Guia do Sono</div>
      <div style="color:rgba(255,255,255,0.75); font-size:0.85rem;">Especialista em sono gentil • 0 a 5 anos</div>
    </div>
  </div>

  <div id="chatMessages" class="chat-messages">
    <!-- Mensagem inicial -->
    <div class="msg-row">
      <div class="msg-bubble-avatar">🌿</div>
      <div class="msg-bubble">
        Olá, mamãe ❤️<br><br>
        Que bom que você está aqui. Sei como as noites podem ser exaustivas.<br>
        Me conta: como está o sono do seu bebê hoje? Estou aqui para te ajudar com calma e carinho.
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <div class="input-wrapper">
      <textarea id="chatInput" class="chat-textarea" 
        placeholder="Como está o sono do seu bebê hoje?" 
        rows="1"
        onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendMessage()}"></textarea>
      <button class="chat-send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<!-- Navegação inferior -->
<nav class="nav-bar">
  <button class="nav-item" onclick="goTo('home')"><span class="nav-icon">🏠</span><div>Início</div></button>
  <button class="nav-item active" onclick="goTo('chat')"><span class="nav-icon">🌙</span><div>Guia</div></button>
  <button class="nav-item" onclick="goTo('library')"><span class="nav-icon">📚</span><div>Biblioteca</div></button>
  <button class="nav-item" onclick="goTo('plans')"><span class="nav-icon">🌟</span><div>Planos</div></button>
</nav>

<script>
// ==================== CONFIGURAÇÃO DO CHAT ====================
const SYSTEM_PROMPT = `Você é a Guia do Sono, uma especialista acolhedora e maternal em sono infantil de 0 a 5 anos. 
Sua voz é calma, empática, suave e sem julgamentos. 
Sempre valide primeiro o cansaço da mãe ("Sei como é difícil...", "Você está fazendo um ótimo trabalho...").
Nunca sugira deixar o bebê chorar. 
Foques em métodos gentis, conexão emocional e rotinas previsíveis. 
Responda em português brasileiro, com linguagem simples, carinho e no máximo 4-5 parágrafos curtos. Use emojis com moderação.`;

let chatHistory = [];

function addMessage(role, content) {
  const container = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = `msg-row ${role === 'user' ? 'user' : ''}`;
  row.innerHTML = `
    <div class="msg-bubble-avatar">${role === 'user' ? '👤' : '🌿'}</div>
    <div class="msg-bubble">${content.replace(/\n/g, '<br>')}</div>
  `;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function addTypingIndicator() {
  const container = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="msg-bubble-avatar">🌿</div>
    <div style="padding:14px 20px; background:white; border:1px solid #e5d9c8; border-radius:24px; border-bottom-left-radius:8px; display:flex; gap:6px;">
      <div style="width:8px;height:8px;background:#e8a97e;border-radius:50%;animation:typing 1.4s infinite;"></div>
      <div style="width:8px;height:8px;background:#e8a97e;border-radius:50%;animation:typing 1.4s infinite; animation-delay:0.2s"></div>
      <div style="width:8px;height:8px;background:#e8a97e;border-radius:50%;animation:typing 1.4s infinite; animation-delay:0.4s"></div>
    </div>
  `;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
  return row;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  input.value = '';

  const typing = addTypingIndicator();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: chatHistory
      })
    });

    const data = await response.json();
    const reply = data.reply || "Desculpe, não consegui responder agora. Pode tentar novamente?";

    typing.remove();
    addMessage('assistant', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch (err) {
    typing.remove();
    addMessage('assistant', "Ops... Tive um erro de conexão. Pode tentar novamente? ❤️");
  }
}

// Navegação simples (para outras telas)
function goTo(screen) {
  alert(`Você clicou em ${screen}. Esta tela ainda está em desenvolvimento.`);
}

// Inicialização
document.addEventListener('DOMContentLoaded', () => {
  console.log("Guia do Sono carregado - Chat com Gemini pronto");
});
</script>

<style>
@keyframes typing {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}
</style>
</body>
</html>
