<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Guia do Sono — Entrar</title>
<meta name="theme-color" content="#2c3e2d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Guia do Sono">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream:   #faf6ef;
  --warm:    #fff9f2;
  --sage:    #8a9e7f;
  --sage-l:  #b5c9a8;
  --sage-d:  #5a7050;
  --sage-p:  #edf3e8;
  --tc:      #c47a52;
  --tc-l:    #e8a97e;
  --tc-p:    #f5e0d0;
  --brown:   #7a5c3e;
  --brown-l: #a07850;
  --linen:   #ede5d8;
  --linen-d: #d8ccb8;
  --night:   #2c3e2d;
  --gold:    #c9a84c;
  --gold-l:  #e8cc7e;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ── HERO TOPO ESCURO ── */
.login-hero {
  background: var(--night);
  padding: env(safe-area-inset-top, 20px) 28px 52px;
  padding-top: max(env(safe-area-inset-top, 0px), 40px);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.login-hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 80% at 10% 80%, rgba(138,158,127,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 90% 10%, rgba(201,168,76,0.14) 0%, transparent 55%);
  pointer-events: none;
}

.hero-leaves {
  position: absolute;
  right: -10px; top: -10px;
  width: 130px;
  opacity: 0.10;
  pointer-events: none;
}
.moon-svg {
  position: absolute;
  bottom: -18px; right: 24px;
  width: 56px;
  opacity: 0.18;
  z-index: 1;
}

.login-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(201,168,76,0.18);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold-l);
  margin-bottom: 16px;
  position: relative;
  z-index: 1;
}
.badge-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold-l);
  animation: blink 2.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

.login-logo {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}
.login-logo em { color: var(--tc-l); font-style: italic; }

.login-tagline {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  position: relative;
  z-index: 1;
}

/* curva na base do hero */
.hero-curve {
  display: block;
  width: 100%;
  margin-bottom: -2px;
  background: var(--night);
}

/* ── FORM AREA ── */
.login-form-wrap {
  flex: 1;
  padding: 32px 24px;
  padding-bottom: max(env(safe-area-inset-bottom, 0px), 32px);
  display: flex;
  flex-direction: column;
  background: var(--cream);
  background-image:
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c47a52' fill-opacity='0.018'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
}

.form-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--night);
  margin-bottom: 4px;
}
.form-title em { color: var(--tc); font-style: italic; }
.form-sub {
  font-size: 13px;
  color: var(--brown-l);
  margin-bottom: 28px;
  font-family: 'Lora', serif;
  font-style: italic;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}
.input-wrap { position: relative; }
.input-icon {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  pointer-events: none;
}
.form-input {
  width: 100%;
  padding: 15px 16px 15px 46px;
  border: 1.5px solid var(--linen-d);
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--night);
  background: var(--warm);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
.form-input::placeholder { color: var(--brown-l); opacity: 0.55; }
.form-input:focus {
  border-color: var(--sage);
  box-shadow: 0 0 0 3px rgba(138,158,127,0.12);
}

.forgot-link {
  font-size: 12px;
  color: var(--tc);
  text-align: right;
  margin-bottom: 20px;
  cursor: pointer;
  font-weight: 500;
}

.btn-primary {
  width: 100%;
  padding: 16px;
  background: var(--night);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  margin-bottom: 16px;
  -webkit-appearance: none;
}
.btn-primary:hover { background: var(--sage-d); }
.btn-primary:active { transform: scale(0.99); }

.divider-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.divider-row::before, .divider-row::after {
  content: ''; flex: 1; height: 1px;
  background: var(--linen-d);
}
.divider-text { font-size: 11px; color: var(--brown-l); white-space: nowrap; }

.btn-google {
  width: 100%;
  padding: 14px;
  background: var(--warm);
  color: var(--night);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  border: 1.5px solid var(--linen-d);
  border-radius: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: background 0.2s;
  margin-bottom: 24px;
  -webkit-appearance: none;
}
.btn-google:hover { background: var(--linen); }

.signup-row {
  text-align: center;
  font-size: 13px;
  color: var(--brown-l);
  margin-top: auto;
}
.signup-link {
  color: var(--tc);
  font-weight: 600;
  cursor: pointer;
  margin-left: 4px;
}

/* ── SUCESSO ── */
.success-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--night);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
}
.success-overlay.show { display: flex; animation: fadeUp 0.4s ease; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
.success-icon { font-size: 52px; }
.success-msg-text {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  text-align: center;
}
.success-msg-text em { color: var(--tc-l); font-style: italic; }
.success-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  font-family: 'Lora', serif;
  font-style: italic;
}
</style>
</head>
<body>

<!-- SUCESSO -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">🌿</div>
  <div class="success-msg-text">Bem-vinda de volta,<br><em>mamãe</em></div>
  <div class="success-sub">Carregando seu Guia do Sono…</div>
</div>

<!-- HERO -->
<div class="login-hero">
  <svg class="hero-leaves" viewBox="0 0 130 180" fill="none">
    <path d="M65 175C35 145 5 110 10 65C15 20 55 5 65 2C75 5 115 20 120 65C125 110 95 145 65 175Z" fill="#b5c9a8"/>
    <path d="M65 2 L65 175" stroke="#b5c9a8" stroke-width="1.5" opacity="0.5"/>
    <path d="M65 40 C48 52 32 65 26 90" stroke="#b5c9a8" stroke-width="1" opacity="0.4"/>
    <path d="M65 40 C82 52 98 65 104 90" stroke="#b5c9a8" stroke-width="1" opacity="0.4"/>
    <path d="M65 90 C48 105 34 118 30 135" stroke="#b5c9a8" stroke-width="1" opacity="0.4"/>
    <path d="M65 90 C82 105 96 118 100 135" stroke="#b5c9a8" stroke-width="1" opacity="0.4"/>
  </svg>
  <svg class="moon-svg" viewBox="0 0 56 56" fill="none">
    <path d="M46 28C46 37.94 37.94 46 28 46C18.06 46 10 37.94 10 28C10 18.06 18.06 10 28 10C18 14 13 21 13 28C13 35 18 42 28 46C36 42 41 35 41 28C41 21 36 14 28 10C38 10 46 18.06 46 28Z" fill="#c9a84c"/>
  </svg>

  <div class="login-badge">
    <span class="badge-dot"></span>
    Guia do Sono · App
  </div>
  <div class="login-logo">Sono gentil,<br>noites <em>mais leves</em></div>
  <div class="login-tagline">Para a mãe que merece descansar também.</div>
</div>

<!-- FORM -->
<div class="login-form-wrap">
  <div class="form-title">Entre na sua <em>conta</em></div>
  <div class="form-sub">Sua família te espera aqui dentro 🌿</div>

  <div class="input-group">
    <div class="input-wrap">
      <span class="input-icon">✉️</span>
      <input class="form-input" type="email" id="emailInput" placeholder="Seu e-mail" autocomplete="email">
    </div>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input class="form-input" type="password" id="passInput" placeholder="Senha" autocomplete="current-password">
    </div>
  </div>

  <div class="forgot-link">Esqueci minha senha</div>

  <button class="btn-primary" onclick="handleLogin()">Entrar no Guia do Sono</button>

  <div class="divider-row">
    <span class="divider-text">ou continue com</span>
  </div>

  <button class="btn-google" onclick="handleLogin()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
      <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.96L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Entrar com Google
  </button>

  <div class="signup-row">
    Ainda não tem conta?
    <span class="signup-link" onclick="handleLogin()">Criar conta grátis</span>
  </div>
</div>

<script>
function handleLogin() {
  document.getElementById('successOverlay').classList.add('show');
  setTimeout(() => {
    window.location.href = 'dashboard.html';
  }, 1600);
}
document.getElementById('passInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

// Registrar service worker (PWA)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
