
<style>
  :root {
    --cream: #faf6ef;
    --terracotta: #c47a52;
    --terra-light: #e8a97e;
    --terra-pale: #f5e0d0;
    --sage: #8a9e7f;
    --sage-light: #b5c9a8;
    --sage-dark: #5a7050;
    --brown: #7a5c3e;
    --brown-light: #a07850;
    --night: #2c3e2d;
    --gold: #c9a84c;
    --lavender: #9b8eb5;
    --sky: #7a9eb5;
    --linen: #ede5d8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: var(--font-sans); }

  .qs-wrap {
    padding: 0 0 2rem;
    max-width: 760px;
    margin: 0 auto;
  }

  .qs-header {
    text-align: center;
    padding: 1.5rem 1rem 1rem;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    margin-bottom: 1.5rem;
  }
  .qs-badge {
    display: inline-block;
    background: var(--terra-pale);
    color: var(--terracotta);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .qs-title {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 400;
    color: var(--color-text-primary);
    margin-bottom: 6px;
  }
  .qs-sub {
    font-size: 13px;
    color: var(--color-text-secondary);
    line-height: 1.6;
  }

  .q-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .q-card:hover {
    border-color: var(--color-border-secondary);
  }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
  }

  .q-num-wrap {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    margin-top: 1px;
  }

  .q-main {
    flex: 1;
  }

  .q-category {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .q-text {
    font-size: 15px;
    font-weight: 500;
    color: var(--color-text-primary);
    line-height: 1.45;
  }

  .q-toggle {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--color-background-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--color-text-secondary);
    transition: transform 0.2s, background 0.2s;
    margin-top: 4px;
  }

  .q-card.open .q-toggle {
    transform: rotate(180deg);
  }

  .q-body {
    display: none;
    padding: 0 18px 18px 64px;
    border-top: 0.5px solid var(--color-border-tertiary);
    margin-top: 0;
  }
  .q-body.open {
    display: block;
    padding-top: 14px;
  }

  .q-input-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
  }

  .q-options {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .q-option {
    padding: 5px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--color-border-secondary);
    font-size: 13px;
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
  }
  .q-option:hover {
    border-color: var(--terracotta);
    color: var(--terracotta);
    background: var(--terra-pale);
  }

  .trigger-box {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 12px 14px;
    margin-top: 14px;
  }

  .trigger-head {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
  }
  .trigger-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .trigger-item {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
    line-height: 1.5;
    color: var(--color-text-secondary);
  }
  .trigger-item:last-child { margin-bottom: 0; }
  .trigger-condition {
    font-weight: 500;
    flex-shrink: 0;
    color: var(--color-text-primary);
  }

  .source-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
    margin-right: 4px;
    letter-spacing: 0.5px;
  }
  .src-tabela {
    background: color-mix(in srgb, var(--terracotta) 12%, transparent);
    color: var(--terracotta);
    border: 0.5px solid color-mix(in srgb, var(--terracotta) 25%, transparent);
  }
  .src-dicio {
    background: color-mix(in srgb, var(--sage) 15%, transparent);
    color: var(--sage-dark);
    border: 0.5px solid color-mix(in srgb, var(--sage) 30%, transparent);
  }
  .src-ritual {
    background: color-mix(in srgb, var(--gold) 15%, transparent);
    color: #8a6a1a;
    border: 0.5px solid color-mix(in srgb, var(--gold) 30%, transparent);
  }

  .q-intent {
    font-size: 12px;
    color: var(--color-text-secondary);
    line-height: 1.6;
    font-style: italic;
    margin-bottom: 12px;
    padding-left: 10px;
    border-left: 2px solid var(--color-border-secondary);
  }

  .expand-all-btn {
    display: block;
    margin: 0 auto 16px;
    padding: 6px 18px;
    font-size: 12px;
    cursor: pointer;
    color: var(--color-text-secondary);
    background: transparent;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 20px;
    transition: all 0.15s;
  }
  .expand-all-btn:hover {
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
  }

  .summary-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .sum-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 12px;
    color: var(--color-text-secondary);
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
  }
  .sum-dot { width: 7px; height: 7px; border-radius: 50%; }
</style>

<div class="qs-wrap">
  <div class="qs-header">
    <div class="qs-badge">Guia do Sono · App</div>
    <h1 class="qs-title">Questionário de Boas-Vindas</h1>
    <p class="qs-sub">10 perguntas estratégicas · Gatilhos mapeados para Tabela, Dicionário e Ritual</p>
  </div>

  <div class="summary-bar">
    <div class="sum-chip"><div class="sum-dot" style="background:#c47a52;"></div> 4 perguntas de perfil</div>
    <div class="sum-chip"><div class="sum-dot" style="background:#8a9e7f;"></div> 3 perguntas de ambiente</div>
    <div class="sum-chip"><div class="sum-dot" style="background:#9b8eb5;"></div> 2 perguntas de dificuldade</div>
    <div class="sum-chip"><div class="sum-dot" style="background:#c9a84c;"></div> 1 pergunta emocional</div>
  </div>

  <button class="expand-all-btn" onclick="toggleAll()">Expandir todas as perguntas</button>

  <div id="questions"></div>
</div>

<script>
const questions = [
  {

    triggers: [
      { cond: "0–3 meses", action: 'Acionar "Quarto Trimestre": janela de 45–90 min, até 6 sonecas/dia. Normalizar colo sem culpa. Mensagem: "não existe vício em colo antes dos 4 meses".', sources: ["tabela"] },
      { cond: "4–6 meses", action: 'Acionar protocolo Regressão dos 4 Meses: arquitetura de sono mudou para sempre. Apresentar conceito de Pressão de Sono e Cortisol da Tabela.', sources: ["tabela","dicio"] },
      { cond: "7–12 meses", action: 'Acionar era das 2 sonecas + ansiedade de separação (Dicionário, Salto 8 meses). Janela de 2,5–3,5h.', sources: ["tabela","dicio"] },
      { cond: "1–2 anos", action: 'Janela de 3–6h. Alertar sobre Transição 2→1 soneca. Reforçar ritual noturno (Ritual de Ouro).', sources: ["tabela","ritual"] },
      { cond: "2–5 anos", action: 'Foco em higiene do sono, consistência do ritual. Janela máxima de 5–6h. Possível recusa de sono.', sources: ["tabela","ritual"] },
    ]
  },
  {
    num: 2,
    color: "#c47a52",
    category: "Perfil do Bebê",
    text: "Qual é o peso aproximado do seu bebê?",
    options: ["Menos de 3 kg","3–5 kg","5–8 kg","8–12 kg","Mais de 12 kg","Não sei exato"],
    intent: "O peso cruza com a idade para validar se a faixa etária bate com o desenvolvimento esperado. Bebês prematuros ou com peso baixo têm janelas de sono menores.",
    triggers: [
      { cond: "Bebê prematuro / peso muito baixo para a idade", action: 'Acionar aviso de ajuste: "Calcule a idade corrigida para janelas de sono. Bebês prematuros precisam de janelas menores que a tabela padrão."', sources: ["tabela"] },
      { cond: "Peso adequado para faixa etária", action: 'Confirmar uso das janelas padrão da Tabela Mestra. Não há ajuste necessário.', sources: ["tabela"] },
      { cond: "Peso alto para a faixa (possível acelerado)", action: 'Sugerir observar sinais de sono da faixa etária seguinte. Bebês maiores podem ter janelas levemente mais longas.', sources: ["tabela"] },
    ]

  {

    color: "#c47a52",

    text: "Como está o sono noturno dele agora?",

      { cond: "Acorda 3–5x", action: 'Investigar causa: janela perdida? Associação de sono? Salto? Sugerir revisão da janela de acordado da Tabela.', sources: ["tabela","dicio"] },

  },
  {
    num: 4,

      { cond: "Sim, ruído branco consistente", action: 'Ambiente sonoro adequado. Confirmar volume e consistência. Investigar outras variáveis.', sources: ["dicio"] },

  {

function renderSourceTag(src) {
  if (src === "tabela") return `<span class="source-tag src-tabela">Tabela Mestra</span>`;
  if (src === "dicio") return `<span class="source-tag src-dicio">Dicionário Sensorial</span>`;
  if (src === "ritual") return `<span class="source-tag src-ritual">Ritual de Ouro</span>`;
  return "";
}

function renderCard(q) {
  const triggersHtml = q.triggers.map(t => `
    <div class="trigger-item">
      <span class="trigger-condition">${t.cond}:</span>
      <span>${t.action} ${t.sources.map(renderSourceTag).join("")}</span>
    </div>
  `).join("");

  const optionsHtml = q.options.map(o => `<button class="q-option" onclick="return false;">${o}</button>`).join("");

  return `
    <div class="q-card" id="qcard-${q.num}">
      <div class="q-header" onclick="toggleCard(${q.num})">
        <div class="q-num-wrap" style="background:${q.color}22; color:${q.color}; border: 0.5px solid ${q.color}44;">
          ${q.num}
        </div>
        <div class="q-main">
          <div class="q-category" style="color:${q.color}">${q.category}</div>
          <div class="q-text">${q.text}</div>
        </div>
        <div class="q-toggle">▾</div>
      </div>
      <div class="q-body" id="qbody-${q.num}">
        <p class="q-intent">${q.intent}</p>
        <div class="q-input-label">Formato de resposta sugerido</div>
        <div class="q-options">${optionsHtml}</div>
        <div class="trigger-box">
          <div class="trigger-head">
            <div class="trigger-dot" style="background:${q.color};"></div>
            Gatilhos de conselho por resposta
          </div>
          ${triggersHtml}
        </div>
      </div>
    </div>
  `;
}

document.getElementById("questions").innerHTML = questions.map(renderCard).join("");

function toggleCard(num) {
  const card = document.getElementById(`qcard-${num}`);
  const body = document.getElementById(`qbody-${num}`);
  const isOpen = body.classList.contains("open");
  body.classList.toggle("open", !isOpen);
  card.classList.toggle("open", !isOpen);
}

let allOpen = false;
function toggleAll() {
  allOpen = !allOpen;
  questions.forEach(q => {
    const card = document.getElementById(`qcard-${q.num}`);
    const body = document.getElementById(`qbody-${q.num}`);
    body.classList.toggle("open", allOpen);
    card.classList.toggle("open", allOpen);
  });
  document.querySelector(".expand-all-btn").textContent = allOpen ? "Recolher todas" : "Expandir todas as perguntas";
}
</script>
